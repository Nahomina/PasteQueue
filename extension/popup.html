<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PasteQueue</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 360px;
      background: #fff;
      color: #111;
      font-size: 13px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #e5e7eb;
      background: #f9fafb;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 15px;
      color: #111;
    }

    .logo svg { color: #6366f1; }

    .open-btn {
      font-size: 12px;
      color: #6366f1;
      text-decoration: none;
      padding: 4px 10px;
      border: 1px solid #e0e7ff;
      border-radius: 6px;
      background: #eef2ff;
    }

    .open-btn:hover { background: #e0e7ff; }

    /* Auth state */
    .auth-section {
      padding: 20px 16px;
      text-align: center;
    }

    .auth-section p { color: #6b7280; margin-bottom: 12px; line-height: 1.5; }

    .sign-in-btn {
      display: inline-block;
      background: #6366f1;
      color: white;
      padding: 8px 20px;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      font-size: 13px;
    }

    .sign-in-btn:hover { background: #4f46e5; }

    /* Queue */
    .queue-section { max-height: 420px; overflow-y: auto; }

    .queue-item {
      padding: 10px 16px;
      border-bottom: 1px solid #f3f4f6;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: background 0.1s;
    }

    .queue-item:hover { background: #f9fafb; }

    .queue-item:last-child { border-bottom: none; }

    .item-meta {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .type-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 4px;
      text-transform: uppercase;
    }

    .type-text { background: #dbeafe; color: #1e40af; }
    .type-url  { background: #dcfce7; color: #166534; }
    .type-code { background: #fef3c7; color: #92400e; }

    .item-time { font-size: 11px; color: #9ca3af; margin-left: auto; }

    .item-content {
      color: #374151;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      font-size: 12px;
      line-height: 1.5;
    }

    .item-content.code { font-family: monospace; background: #f9fafb; padding: 4px; border-radius: 4px; }

    .copy-feedback {
      font-size: 11px;
      color: #10b981;
      font-weight: 600;
    }

    .pinned { background: #eef2ff; }

    /* Footer */
    .footer {
      padding: 10px 16px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status { font-size: 11px; color: #9ca3af; }
    .status.connected { color: #10b981; }

    .sign-out-btn {
      font-size: 11px;
      color: #9ca3af;
      background: none;
      border: none;
      cursor: pointer;
    }
    .sign-out-btn:hover { color: #ef4444; }

    .empty-state {
      padding: 32px 16px;
      text-align: center;
      color: #9ca3af;
      font-size: 13px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
      </svg>
      PasteQueue
    </div>
    <a href="https://pastequeue.app/dashboard" target="_blank" class="open-btn">Open Dashboard</a>
  </div>

  <div id="auth-section" class="auth-section" style="display:none">
    <p>Sign in to start capturing your clipboard history across all devices.</p>
    <a href="https://pastequeue.app/login" target="_blank" class="sign-in-btn">Sign In</a>
  </div>

  <div id="queue-section" class="queue-section" style="display:none">
    <div id="items-list"></div>
  </div>

  <div id="footer" class="footer" style="display:none">
    <span id="status" class="status">Not connected</span>
    <button id="sign-out-btn" class="sign-out-btn">Sign out</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
